appID: "atoswl"
owner: "richardm"

objectID: "atoswl-train"
type: Job

yamlSource:
  kind: Job
  apiVersion: batch/v1
  metadata:
    name: $appID$-$objectID$-$instance$
    namespace: $namespace$
    labels:
      app: atoswl
  spec:
    parallelism: 1
    completions: 1
    backoffLimit: 3
    template:
      metadata:
        labels:
          app: $appID$
      spec:
        nodeSelector:
          node-role.ida/gpu2080ti: 'true'
        restartPolicy: OnFailure
        schedulerName: default-scheduler
        securityContext: {}
        containers:
          - resources:
              limits:
                cpu: '6'
                memory: 56Gi
                nvidia.com/gpu: '1'
              requests:
                cpu: '3'
                memory: 18Gi
                nvidia.com/gpu: '1'
            name: recommenderframework
            command:
              - /yes/envs/py37torch13/bin/python
            imagePullPolicy: Always
            volumeMounts:
              - name: nfs-access
                mountPath: /nfs/
            terminationMessagePolicy: File
            image: 'docker-registry.default.svc:5000/$namespace$/is-cikm-rerun:latest'
            workingDir: /nfs/RecFramework/cikm_rerun/examples/
            args:
              - train_vbcar.py
              - '--dataset'
              - tafeng
              - '--emb_dim'
              - '$emb_dim$'
              - '--batch_size'
              - '$batch_size$'
            ports:
              - name: promexporter
                containerPort: 8003
                protocol: TCP
            env:
              - name: "owner"
                value: "$owner$"
              - name: "namespace"
                value: "$namespace$"
              - name: "appID"
                value: "$appID$"
              - name: "instance"
                value: "$instance$"
              - name: "objectID"
                value: "$objectID$"
        serviceAccount: containerroot
        volumes:
          - name: nfs-access
            persistentVolumeClaim:
              claimName: zaiqiaovol1claim
        dnsPolicy: ClusterFirst