appID: "atoswl"
owner: "richardm"
namespace: "richardmproject"

sequenceID: "trainmodel"
name: "Product Recommender Model Training"
description: "Deploys a instance of the GLA recommendation framework and trains a model. Sequence will copy validation performance metrics into the central database until the learning job ends."
parameters: {}
operations:
  - className: Instantiate
    objectID: "atoswl-train"
    defineInstanceRef: "trainingInstance"
  - className: SetSequenceParameters
    instanceRef: "trainingInstance"
  - className: Apply
    instanceRef: "trainingInstance"
  - className: NewMetricValues
    instanceRef: "trainingInstance"
    metrics: 
      - "ndcg_at_k_valid"
  - className: RecordMetricsUntil
    metrics:
      - "ndcg_at_k_valid"
    instanceRef: "trainingInstance"
    waitForStatus: "Complete"
    gracePeriodSec: 30
mode: Continue