appID: "unittest2"
owner: "richardm"
namespace: "richardmproject"

sequenceID: "seq-unittest2"
name: "30s Sleep Sequence"
description: "Deploys a container as a Job that sleeps for 30 seconds"
parameters: {}
operations:
  - className: Instantiate
    objectID: "sleepjob"
    defineInstanceRef: "sleepjobInstance"
  - className: Apply
    instanceRef: "sleepjobInstance"
  - className: WaitFor
    instanceRef: "sleepjobInstance"
    waitForStatus: "Complete"
  - className: Delete
    instanceRef: "sleepjobInstance"
mode: Continue