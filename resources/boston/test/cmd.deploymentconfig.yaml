
appID: "deeprecsys"
owner: "bigdatastack"
namespace: "realization"
objectID: "cmd"
type: DeploymentConfig

yamlSource: 
  apiVersion: apps.openshift.io/v1
  kind: DeploymentConfig
  metadata:
    name: deeprecsys-cmd-0
    namespace: realization
  spec:
    replicas: 1
    strategy:
      resources: {}
    template:
      metadata:
        labels:
          jobconfig: cmd
          app: DeepRecSys
      spec:
        containers:
        - name: bash
          image: rsippl/centos-dev:latest
          resources:
            limits:
              cpu: "1000m"
              memory: "2048Mi"
          command:
           - 'sleep'
          args:
           - '24h'
          imagePullPolicy: IfNotPresent
        securityContext: {}
        serviceAccount: default