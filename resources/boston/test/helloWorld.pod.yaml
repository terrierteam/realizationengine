appID: "test"
owner: bigdatastack
objectID: "helloworldpod"
namespace: "realization"
type: Pod

yamlSource:
  apiVersion: v1
  kind: Pod
  metadata:
    name: test-helloworldpod
    namespace: realization
  spec:
    containers:
    - name: hwcontainer
      image: rsippl/centos-dev:latest 
      imagePullPolicy: IfNotPresent
      command:
        - 'echo'
      args:
        - 'hello world' 
      resources: {}
    dnsPolicy: ClusterFirst
    restartPolicy: Never