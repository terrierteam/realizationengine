appID: "grss"
name: "Grocery Recommender System (Spark)"
description: >
  This is a real-time grocery recommender system built using stream processing capability from Apache Spark's streaming package. It is comprised of three main functional blocks: 
  1) the feedback collector that recieves interactions from external grocery storefronts (clicks on products);
  2) the internal data stream transfer system that is comprised of Kafka with support from zookeeper;
  3) the spark cluster that hosts supervised product recommendation system that is periodically updated.
owner: "$owner$"
namespace: "$namespace$"
types:
 - playbook
 - inferMissingValues
 - overrideValues
 - setObjectMetadata


objects:
        
  # Deployment Config: feedbackloadgenerator
  - objectID: "feedbackloadgenerator"
    yamlSource:
      kind: DeploymentConfig
      apiVersion: apps.openshift.io/v1
      metadata:
        labels:
          app: feedbackloadgenerator
      spec:
        triggers:
          - type: ConfigChange
        replicas: 1
        revisionHistoryLimit: 10
        selector:
          app: feedbackloadgenerator
        template:
          metadata:
            labels:
              app: feedbackloadgenerator
          spec:
            containers:
              - name: feedbackloadgenerator
                image: >-
                  jdtotow/tester:latest
                env:
                  - name: appID
                    value: $appID$
                  - name: objectID
                    value: $objectID$
                  - name: instance
                    value: $instance$
                  - name: owner
                    value: $owner$
                  - name: namespace
                    value: $namespace$
                  - name: FEEDBACKS_HOSTNAME
                    value: '$serviceFeedbackCollectorLookup$'
                  - name: NTHREADS
                    value: '$NTHREADS$'
                  - name: NREQUEST
                    value: '$NREQUEST$'
                  - name: SLEEP_TIME
                    value: '$SLEEP_TIME$'
                resources: {}
                imagePullPolicy: Always
            restartPolicy: Always
            terminationGracePeriodSeconds: 30
            dnsPolicy: ClusterFirst
        
  - objectID: "feedbackcollectorconfig"
    yamlSource:
      apiVersion: v1
      kind: ConfigMap
      data:
         application-realizationengine.properties: >
           spring.datasource.driver-class-name=com.leanxcale.client.Driver

           spring.datasource.url=jdbc:leanxcale://$lxsService$:1529/BigDataStackDB;user=EROSKI

           spring.datasource.username=

           spring.datasource.password=

           spring.datasource.tomcat.max-wait=20000

           spring.datasource.tomcat.max-active=50

           spring.datasource.tomcat.max-idle=20

           spring.datasource.tomcat.min-idle=15

           kafka.bootstrap.servers=$kafkaLookup$:9092

        
  # Deployment Config: feedbackcollector
  - objectID: "feedbackcollector"
    yamlSource:
      kind: DeploymentConfig
      apiVersion: apps.openshift.io/v1
      metadata:
        labels:
          app: feedbackcollector
      spec:
        triggers:
          - type: ConfigChange
        replicas: 1
        selector:
          app: feedbackcollector
        template:
          metadata:
            labels:
              app: feedbackcollector
              deploymentconfig: feedbackcollector
          spec:
            volumes:
             - name: config
               configMap:
                 name: $feedbackcollectorConfigMap$
                 defaultMode: 420
            containers:
              - name: feedbackcollector
                image: >-
                  $ocimagerepositoryhost$/$namespace$/feedbackcollector:latest
                workingDir: /home/app/
                command:
                 - 'java'
                args:
                 - '-Dspring.profiles.active=realizationengine'
                 - '-jar'
                 - '/usr/local/lib/feedbackcollector-0.0.1-SNAPSHOT.jar'
                ports:
                  - name: "tcp-8080"
                    containerPort: 8080
                    protocol: TCP
                  - name: "tcp-8443"
                    containerPort: 8443
                    protocol: TCP
                  - name: "tcp-8778"
                    containerPort: 8778
                    protocol: TCP
                  - name: promexporter
                    containerPort: 9678
                    protocol: TCP
                resources:
                  limits:
                    cpu: '1000m'
                    memory: 2Gi
                  requests:
                    cpu: 100m
                    memory: 700Mi
                env:
                  - name: appID
                    value: $appID$
                  - name: objectID
                    value: $objectID$
                  - name: instance
                    value: $instance$
                  - name: owner
                    value: $owner$
                  - name: namespace
                    value: $namespace$
                volumeMounts:
                  - name: config
                    readOnly: true
                    mountPath: /home/app/
                resources: {}
                imagePullPolicy: Always
            restartPolicy: Always
            terminationGracePeriodSeconds: 30
            dnsPolicy: ClusterFirst
  
  # Service: srv-feedbackcollector
  - objectID: "srv-feedbackcollector"
    yamlSource:
      kind: Service
      apiVersion: v1
      metadata:
        labels:
          app: feedbackcollector
      spec:
        ports:
          - name: 8080-tcp
            protocol: TCP
            port: 8080
            targetPort: 8080
          - name: 8443-tcp
            protocol: TCP
            port: 8443
            targetPort: 8443
          - name: 8778-tcp
            protocol: TCP
            port: 8778
            targetPort: 8778
        selector:
          app: feedbackcollector
        type: ClusterIP
        
  # Route: route-feedbackcollector
  - objectID: "route-feedbackcollector"
    yamlSource:
      kind: Route
      apiVersion: route.openshift.io/v1
      spec:
        host: feedbackcollector-$namespace$.$hostExtension$
        to:
          kind: Service
          name: $serviceFeedbackCollectorLookup$
          weight: 100
        port:
          targetPort: 8080-tcp
        wildcardPolicy: None
  
  # Deployment Config: zookeeper-server
  - objectID: "zookeeper-server"
    yamlSource:
      kind: DeploymentConfig
      apiVersion: apps.openshift.io/v1
      metadata:
        labels:
          app: zookeeper-server
      spec:
        triggers:
          - type: ConfigChange
        replicas: 2
        revisionHistoryLimit: 10
        selector:
          app: zookeeper-server
        template:
          metadata:
            labels:
              app: zookeeper-server
          spec:
            containers:
              - name: zookeeper-server
                image: >-
                  bitnami/zookeeper:latest
                ports:
                  - name: "tcp-2181"
                    containerPort: 2181
                    protocol: TCP
                env:
                  - name: ALLOW_ANONYMOUS_LOGIN
                    value: 'yes'
                  - name: appID
                    value: $appID$
                  - name: objectID
                    value: $objectID$
                  - name: instance
                    value: $instance$
                resources:
                  limits:
                    cpu: '500m'
                    memory: 2Gi
                  requests:
                    cpu: 50m
                    memory: 700Mi
                imagePullPolicy: Always
            restartPolicy: Always
            terminationGracePeriodSeconds: 30
            dnsPolicy: ClusterFirst
  
  # Service: srv-zookeeper
  - objectID: "srv-zookeeper"
    yamlSource:
      kind: Service
      apiVersion: v1
      metadata:
        labels:
          app: zookeeper-server
      spec:
        ports:
          - name: 'tcp-2183'
            protocol: TCP
            port: 2183
            targetPort: 2181
        selector:
          app: zookeeper-server
        type: ClusterIP
  
  # Deployment Config: kafka-server
  - objectID: "kafka-server"
    yamlSource:
      kind: DeploymentConfig
      apiVersion: apps.openshift.io/v1
      metadata:
        labels:
          app: kafka-server
      spec:
        triggers:
          - type: ConfigChange
        replicas: 1
        revisionHistoryLimit: 10
        selector:
          app: kafka-server
        template:
          metadata:
            labels:
              app: kafka-server
          spec:
            containers:
              - name: kafka-server
                image: >-
                  bitnami/kafka:latest
                ports:
                  - name: "tcp-9092"
                    containerPort: 9092
                    protocol: TCP
                env:
                  - name: appID
                    value: $appID$
                  - name: objectID
                    value: $objectID$
                  - name: instance
                    value: $instance$
                  - name: ALLOW_PLAINTEXT_LISTENER
                    value: 'yes'
                  - name: KAFKA_BROKER_ID
                    value: '2'
                  - name: KAFKA_LISTENERS
                    value: 'PLAINTEXT://:9092'
                  - name: KAFKA_CFG_ADVERTISED_LISTENERS
                    value: 'PLAINTEXT://$kafkaLookup$:9092'
                  - name: KAFKA_CFG_ZOOKEEPER_CONNECT
                    value: '$zookeeperLookup$:2183'
                  - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
                    value: '1'
                resources:
                  limits:
                    cpu: '1000m'
                    memory: 2Gi
                  requests:
                    cpu: 100m
                    memory: 700Mi
                imagePullPolicy: Always
            restartPolicy: Always
            terminationGracePeriodSeconds: 30
            dnsPolicy: ClusterFirst
            
    # Service: srv-kafka
  - objectID: "srv-kafka"
    yamlSource:
      kind: Service
      apiVersion: v1
      metadata:
        labels:
          app: kafka-server
      spec:
        ports:
          - name: 'tcp-9092'
            protocol: TCP
            port: 9092
            targetPort: 9092
        selector:
          app: kafka-server
        type: ClusterIP
  
  # Deployment Config: spark-master
  - objectID: "spark-master"
    yamlSource:
      apiVersion: apps.openshift.io/v1
      kind: DeploymentConfig
      spec:
        replicas: 1
        strategy:
          resources: {}
        template:
          metadata:
            labels:
              jobconfig: $appID$-$objectID$-$instance$
              sparkmaster: $appID$-$objectID$
          spec:
            containers:
             - name: master
               image: "$ocimagerepositoryhost$/$namespace$/is-bigdatastack-spark:latest"
               ports: 
                - name: "masterport"
                  containerPort: 7077
                  protocol: "TCP"
                - name: "masterui"
                  containerPort: 8080
                  protocol: "TCP"
               env:
                - name: "owner"
                  value: "$owner$"
                - name: "namespace"
                  value: "$namespace$"
                - name: "appID"
                  value: "$appID$"
                - name: "objectID"
                  value: "$objectID$"
                - name: "instance"
                  value: "$instance$"
                - name: "SPARK_MODE"
                  value: "master"
                - name: "LXDB_HOST"
                  value: "srv-lxdb"
                - name: "LXDB_PORT"
                  value: "1529"
                - name: "LXDB_DBNAME"
                  value: "BigDataStackDB"
                - name: "LXDB_USERNAME"
                  value: "EROSKI"
                - name: "KAFKA_TOPIC"
                  value: "test"
                - name: "KAFKA_HOST"
                  value: "$kafkaLookup$"
                - name: "KAFKA_HOST"
                  value: "9092"
                - name: "KAFKA_GROUPID"
                  value: "my-group"
               resources: 
                 limits:
                   cpu: "1000m"
                   memory: "2048Mi"
                 requests:
                   cpu: "1000m"
                   memory: "2048Mi"
               securityContext: {}
               serviceAccount: containerroot
               imagePullPolicy: "Always"
            restartPolicy: "Always"
  
  # Deployment Config: spark-worker
  - objectID: "spark-worker"
    yamlSource:
      apiVersion: apps.openshift.io/v1
      kind: DeploymentConfig
      spec:
        replicas: 1
        strategy:
          resources: {}
        template:
          metadata:
            labels:
              jobconfig: $appID$-$objectID$-$instance$
          spec:
            containers:
             - name: master
               image: "$ocimagerepositoryhost$/$namespace$/is-bigdatastack-spark:latest"
               ports: 
                - name: "workerport"
                  containerPort: 7077
                  protocol: "TCP"
               env:
                - name: "owner"
                  value: "$owner$"
                - name: "namespace"
                  value: "$namespace$"
                - name: "appID"
                  value: "$appID$"
                - name: "objectID"
                  value: "$objectID$"
                - name: "instance"
                  value: "$instance$"
                - name: "SPARK_MODE"
                  value: "worker"
                - name: "SPARK_MASTER_URL"
                  value: "$sparkmasterservice$:7077"
                - name: "LXDB_HOST"
                  value: "service-lxs-store-eroski.lxs-store.svc.cluster.local"
                - name: "LXDB_PORT"
                  value: "1529"
                - name: "LXDB_DBNAME"
                  value: "BigDataStackDB"
                - name: "LXDB_USERNAME"
                  value: "EROSKI"
                - name: "KAFKA_TOPIC"
                  value: "test"
                - name: "KAFKA_HOST"
                  value: "kafka-server1"
                - name: "KAFKA_HOST"
                  value: "9092"
                - name: "KAFKA_GROUPID"
                  value: "my-group"
               resources: 
                 limits:
                   cpu: "1000m"
                   memory: "2048Mi"
                 requests:
                   cpu: "1000m"
                   memory: "2048Mi"
               securityContext: {}
               serviceAccount: containerroot
               imagePullPolicy: "Always"
            restartPolicy: "Always"
  
  # Service: srv-recommendation-ui
  - objectID: "srv-spark-master"
    yamlSource:
      apiVersion: v1
      kind: Service
      spec:
        selector:
          sparkmaster: $appID$-spark-master
        ports:
          - name: "master"
            protocol: "TCP"
            port: 7077
            targetPort: 7077
          - name: "ui"
            protocol: "TCP"
            port: 8080
            targetPort: 8080
  
  # Route: route-spark
  - objectID: "sparkui"
    yamlSource:
      kind: Route
      apiVersion: route.openshift.io/v1
      spec:
        host: sparkui-$namespace$.$hostExtension$
        to:
          kind: Service
          name: $serviceLookup$
          weight: 100
        port:
          targetPort: ui
        wildcardPolicy: None

sequences:

  # Add Feedback Collector
  - sequenceID: "addrecommender"
    name: "Add Feedback Collector"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Launches a new copy of the feedback collector."
    mode: Continue
    parameters:
      lxsService: "service-lxs-store-eroski.lxs-store.svc.cluster.local"
    operations:
      - className: ParameterFromObjectLookup
        parameter: "feedbackcollectorConfigMap"
        criteria: "$namespace$:configmap:$appID$-feedbackcollectorconfig-.*"
        multipleMatches: "SelectFirst"
      - className: Instantiate
        objectID: "feedbackcollector"
        defineInstanceRef: "feedbackcollectorInstance"
      - className: SetSequenceParameters
        instanceRef: "feedbackcollectorInstance"
      - className: Apply
        instanceRef: "feedbackcollectorInstance"
      - className: WaitFor
        instanceRef: "feedbackcollectorInstance"
        waitForStatus: "Available"
      - className: RegisterWithDynamicOrchestrator
        instanceRef: "feedbackcollectorInstance"
  
  # Delete Feedback Collector
  - sequenceID: "removerecommender"
    name: "Delete Feedback Collector"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Deletes the oldest copy of the feedback collector."
    mode: Continue
    parameters: {}
    operations:
      - className: InstanceRefFromObjectLookup
        criteria: "$namespace$:deploymentconfig:$appID$-feedbackcollector-.*"
        defineInstanceRef: "feedbackcollectorInstance"
        multipleMatches: "SelectFirst"
      - className: Delete
        instanceRef: "feedbackcollectorInstance"

  # Register with DO
  - sequenceID: "orchestratefeedbackcollector"
    name: "Register With Dynamic Orchestrator"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Registers the feedback collector with the Dyanmic Orchestrator"
    mode: Continue
    parameters: {}
    operations:
      - className: InstanceRefFromObjectLookup
        defineInstanceRef: "feedbackcollectorInstance"
        criteria: "$namespace$:deploymentconfig:$appID$-feedbackcollector-.*"
        multipleMatches: "SelectFirst"
      - className: RegisterWithDynamicOrchestrator
        instanceRef: "feedbackcollectorInstance"

  # Create Load
  - sequenceID: "createload"
    name: "Creates some load on the feedback collector"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Launches a container that simulates feedback from customers"
    mode: Continue
    parameters:
      NTHREADS: 10
      NREQUEST: 1000
      SLEEP_TIME: 1
    operations:
      - className: ParameterFromObjectLookup
        parameter: "serviceFeedbackCollectorLookup"
        criteria: "$namespace$:service:$appID$-srv-feedbackcollector-.*"
        multipleMatches: "SelectFirst"
      - className: Instantiate
        objectID: "feedbackloadgenerator"
        defineInstanceRef: "feedbackloadgeneratorInstance"
      - className: SetSequenceParameters
        instanceRef: "feedbackloadgeneratorInstance"
      - className: Apply
        instanceRef: "feedbackloadgeneratorInstance"
  
  - sequenceID: "everything"
    name: "Deploy Full Grocery Recommendation System"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Sequentially deploys the grocery recommendation system from first principles. This will first setup the feedback collector, then launch zookeeper and kafka. Following this, a spark cluster will be deployed, and the job jar will be submitted to the cluster."
    parameters:
      lxsService: "service-lxs-store-eroski.lxs-store.svc.cluster.local"
    operations:
      # Launch Zookeeper
      - className: Instantiate
        objectID: "zookeeper-server"
        defineInstanceRef: "zookeeperInstance"
      - className: SetSequenceParameters
        instanceRef: "zookeeperInstance"
      - className: Apply
        instanceRef: "zookeeperInstance"
      - className: WaitFor
        instanceRef: "zookeeperInstance"
        waitForStatus: "Available"
      - className: Instantiate
        objectID: "srv-zookeeper"
        defineInstanceRef: "newServiceZK"
      - className: Apply
        instanceRef: "newServiceZK"
      # Launch Kafka, also define 'kafkaLookup' and 'zookeeperLookup'
      - className: Instantiate
        objectID: "srv-kafka"
        defineInstanceRef: "newServiceKafka"
      - className: Apply
        instanceRef: "newServiceKafka"
      - className: ParameterFromObjectLookup
        parameter: "kafkaLookup"
        criteria: "$namespace$:service:$appID$-srv-kafka-.*"
        multipleMatches: "SelectFirst"
      - className: ParameterFromObjectLookup
        parameter: "zookeeperLookup"
        criteria: "$namespace$:service:$appID$-srv-zookeeper-.*"
        multipleMatches: "SelectFirst"
      - className: Instantiate
        objectID: "kafka-server"
        defineInstanceRef: "kafkaInstance"
      - className: SetSequenceParameters
        instanceRef: "kafkaInstance"
      - className: Apply
        instanceRef: "kafkaInstance"
      - className: WaitFor
        instanceRef: "kafkaInstance"
        waitForStatus: "Available"
      # Prepare configuration file for the feedback collector
      - className: Instantiate
        objectID: "feedbackcollectorconfig"
        defineInstanceRef: "feedbackcollectorconfigInstance"
      - className: SetSequenceParameters
        instanceRef: "feedbackcollectorconfigInstance"
      - className: Apply
        instanceRef: "feedbackcollectorconfigInstance"
      - className: ParameterFromObjectLookup
        parameter: "feedbackcollectorConfigMap"
        criteria: "$namespace$:configmap:$appID$-feedbackcollectorconfig-.*"
        multipleMatches: "SelectFirst"
      # Launch feedback collector
      - className: Instantiate
        objectID: "feedbackcollector"
        defineInstanceRef: "feedbackcollectorInstance"
      - className: SetSequenceParameters
        instanceRef: "feedbackcollectorInstance"
      - className: Apply
        instanceRef: "feedbackcollectorInstance"
      - className: WaitFor
        instanceRef: "feedbackcollectorInstance"
        waitForStatus: "Available"
      - className: Instantiate
        objectID: "srv-feedbackcollector"
        defineInstanceRef: "newServiceFC"
      - className: Apply
        instanceRef: "newServiceFC"
      - className: ParameterFromObjectLookup
        parameter: "serviceFeedbackCollectorLookup"
        criteria: "$namespace$:service:$appID$-srv-feedbackcollector-.*"
        multipleMatches: "SelectFirst"
      - className: Instantiate
        objectID: "route-feedbackcollector"
        defineInstanceRef: "newRouteFC"
      - className: SetSequenceParameters
        instanceRef: "newRouteFC"
      - className: Apply
        instanceRef: "newRouteFC"
      # Steps for creating the deployment config
      - className: Instantiate # Spawn a new copy from the template
        objectID: "spark-master"
        defineInstanceRef: "master"
      - className: SetSequenceParameters # Fill in any missing placeholders
        instanceRef: "master"
      - className: Apply # Create deployment config on the cluster
        instanceRef: "master"
      - className: WaitFor # Wait until the deployment config is reporting available
        instanceRef: "master"
        waitForStatus: "Available"
      # Now create the service
      - className: Instantiate # Spawn a new copy from the template
        objectID: "srv-spark-master"
        defineInstanceRef: "newService"
      - className: Apply # Create the service on the cluster
        instanceRef: "newService"
      # Now create the route
      - className: ParameterFromObjectLookup # Generates a parameter value by querying the cluster state
        parameter: "serviceLookup"
        criteria: "$namespace$:service:$appID$-srv-spark-master-.*"
        multipleMatches: "SelectFirst"
      - className: Instantiate # Spawn a new copy from the template
        objectID: "sparkui"
        defineInstanceRef: "newRoute"
      - className: SetSequenceParameters # Fill in any missing placeholders (most notably 'serviceLookup' found above)
        instanceRef: "newRoute"
      - className: Apply # Create the route on the cluster
        instanceRef: "newRoute"
      # Steps for creating the deployment config
      - className: Instantiate # Spawn a new copy from the template
        objectID: "spark-worker"
        defineInstanceRef: "worker"
      - className: ParameterFromObjectLookup # lookup the name of the master's service
        parameter: "sparkmasterservice"
        criteria: "$namespace$:service:$appID$-srv-spark-master-.*"
        multipleMatches: "SelectFirst"
      - className: SetSequenceParameters # Fill in any missing placeholders
        instanceRef: "worker"
      - className: Apply # Create deployment config on the cluster
        instanceRef: "worker"
      - className: WaitFor # Wait until the deployment config is reporting available
        instanceRef: "worker"
        waitForStatus: "Available"
      - className: "ExecuteCMD"
        objectID: "spark-master"
        instancelookupCriteria: "first"
        commands:
         - - "wget"
           - "http://nfswebhost-richardmproject.ida.dcs.gla.ac.uk/bigdatastack/ATOSWL/als-spark-streaming-assembly-0.1.jar"
           - "-O"
           - "/tmp/als-spark-streaming-assembly-0.1.jar"
      - className: "ExecuteCMD"
        objectID: "spark-worker"
        instancelookupCriteria: "all"
        commands:
         - - "wget"
           - "http://nfswebhost-richardmproject.ida.dcs.gla.ac.uk/bigdatastack/ATOSWL/als-spark-streaming-assembly-0.1.jar"
           - "-O"
           - "/tmp/als-spark-streaming-assembly-0.1.jar"
      - className: "ExecuteCMD"
        objectID: "spark-master"
        instancelookupCriteria: "first"
        commands:
         - - "bin/spark-submit"
           - "--class"
           - "org.bigdatastack.wl.streaming.MainProcess"
           - "--master"
           - "spark://0.0.0.0:7077"
           - "--deploy-mode"
           - "cluster"
           - "/tmp/als-spark-streaming-assembly-0.1.jar"
    mode: Continue
 
metrics:
  - name: "responseTime"
    metricClassname: "Double"
    summary: "The average response time for the feedback collector"
    maximumValue: 1000000
    minimumValue: 0
    higherIsBetter: "False"
    displayUnit: "ms"
  - name: "costPerHour"
    metricClassname: "Double"
    summary: "The cost of running this component per hour in US dollars."
    maximumValue: 1000000
    minimumValue: 0
    higherIsBetter: "False"
    displayUnit: "$/hour"

slos:
  - metricName: "costPerHour"
    objectID: "feedbackcollector"
    type: "maximum"
    value: 0.01
    breachSeverity: "Alert"
    requirement: "False"
  - metricName: "responseTime"
    objectID: "feedbackcollector"
    type: "maximum"
    value: 100
    breachSeverity: "Alert"
    requirement: "True"
 