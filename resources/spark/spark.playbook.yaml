appID: "grss"
name: "Grocery Recommender System (Spark)"
description: >
  This is a real-time grocery recommender system built using stream processing capability from Apache Spark's streaming package. It is comprised of three main functional blocks: 
  1) the feedback collector that recieves interactions from external grocery storefronts (clicks on products);
  2) the internal data stream transfer system that is comprised of Kafka with support from zookeeper;
  3) the spark cluster that hosts supervised product recommendation system that is periodically updated.
owner: "$owner$"
namespace: "$namespace$"
types:
 - playbook
 - inferMissingValues
 - overrideValues
 - setObjectMetadata


objects:
  # Deployment Config: feedbackcollector
  - objectID: "feedbackcollector"
    yamlSource:
      kind: DeploymentConfig
      apiVersion: apps.openshift.io/v1
      metadata:
        labels:
          app: feedbackcollector
      spec:
        triggers:
          - type: ConfigChange
        replicas: 1
        selector:
          app: feedbackcollector
        template:
          metadata:
            labels:
              app: feedbackcollector
              deploymentconfig: feedbackcollector
          spec:
            containers:
              - name: feedbackcollector
                image: >-
                  $ocimagerepositoryhost$/$namespace$/feedbackcollector:latest
                ports:
                  - name: "8080"
                    containerPort: 8080
                    protocol: TCP
                  - name: "8443"
                    containerPort: 8443
                    protocol: TCP
                  - name: "8778"
                    containerPort: 8778
                    protocol: TCP
                resources: {}
                imagePullPolicy: Always
            restartPolicy: Always
            terminationGracePeriodSeconds: 30
            dnsPolicy: ClusterFirst
  
  # Service: srv-feedbackcollector
  - objectID: "srv-feedbackcollector"
    yamlSource:
      kind: Service
      apiVersion: v1
      metadata:
        labels:
          app: feedbackcollector
      spec:
        ports:
          - name: 8080-tcp
            protocol: TCP
            port: 8080
            targetPort: 8080
          - name: 8443-tcp
            protocol: TCP
            port: 8443
            targetPort: 8443
          - name: 8778-tcp
            protocol: TCP
            port: 8778
            targetPort: 8778
        selector:
          app: feedbackcollector
          deploymentconfig: feedbackcollector
        type: ClusterIP
        
  # Route: route-feedbackcollector
  - objectID: "route-feedbackcollector"
    yamlSource:
      kind: Route
      apiVersion: route.openshift.io/v1
      spec:
        host: feedbackcollector-$namespace$.$hostExtension$
        to:
          kind: Service
          name: $serviceFeedbackCollectorLookup$
          weight: 100
        port:
          targetPort: 8080-tcp
        wildcardPolicy: None
  
  # Deployment Config: zookeeper-server
  - objectID: "zookeeper-server"
    yamlSource:
      kind: DeploymentConfig
      apiVersion: apps.openshift.io/v1
      metadata:
        labels:
          app: zookeeper-server
      spec:
        triggers:
          - type: ConfigChange
        replicas: 2
        revisionHistoryLimit: 10
        selector:
          app: zookeeper-server
        template:
          metadata:
            labels:
              app: zookeeper-server
          spec:
            containers:
              - name: zookeeper-server
                image: >-
                  bitnami/zookeeper:latest
                ports:
                  - name: "2181"
                    containerPort: 2181
                    protocol: TCP
                env:
                  - name: ALLOW_ANONYMOUS_LOGIN
                    value: 'yes'
                resources: {}
                imagePullPolicy: Always
            restartPolicy: Always
            terminationGracePeriodSeconds: 30
            dnsPolicy: ClusterFirst
  
  # Service: srv-zookeeper
  - objectID: "srv-zookeeper"
    yamlSource:
      kind: Service
      apiVersion: v1
      metadata:
        labels:
          app: zookeeper-server
      spec:
        ports:
          - name: '2183'
            protocol: TCP
            port: 2183
            targetPort: 2181
        selector:
          app: zookeeper-server
        type: ClusterIP
  
  # Deployment Config: kafka-server
  - objectID: "kafka-server"
    yamlSource:
      kind: DeploymentConfig
      apiVersion: apps.openshift.io/v1
      metadata:
        labels:
          app: kafka-server
      spec:
        triggers:
          - type: ConfigChange
        replicas: 1
        revisionHistoryLimit: 10
        selector:
          app: kafka-server
        template:
          metadata:
            labels:
              app: kafka-server
          spec:
            containers:
              - name: kafka-server
                image: >-
                  bitnami/kafka:latest
                ports:
                  - name: "9092"
                    containerPort: 9092
                    protocol: TCP
                env:
                  - name: ALLOW_PLAINTEXT_LISTENER
                    value: 'yes'
                  - name: KAFKA_BROKER_ID
                    value: '2'
                  - name: KAFKA_LISTENERS
                    value: 'PLAINTEXT://:9092'
                  - name: KAFKA_CFG_ADVERTISED_LISTENERS
                    value: 'PLAINTEXT://$kafkaLookup$:9092'
                  - name: KAFKA_CFG_ZOOKEEPER_CONNECT
                    value: '$zookeeperLookup$:2183'
                  - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
                    value: '1'
                resources: {}
                imagePullPolicy: Always
            restartPolicy: Always
            terminationGracePeriodSeconds: 30
            dnsPolicy: ClusterFirst
            
    # Service: srv-kafka
  - objectID: "srv-kafka"
    yamlSource:
      kind: Service
      apiVersion: v1
      metadata:
        labels:
          app: kafka-server
      spec:
        ports:
          - name: '9092'
            protocol: TCP
            port: 9092
            targetPort: 9092
        selector:
          app: kafka-server
        type: ClusterIP
  
  # Deployment Config: spark-master
  - objectID: "spark-master"
    yamlSource:
      apiVersion: apps.openshift.io/v1
      kind: DeploymentConfig
      spec:
        replicas: 1
        strategy:
          resources: {}
        template:
          metadata:
            labels:
              jobconfig: $appID$-$objectID$-$instance$
              sparkmaster: $appID$-$objectID$
          spec:
            containers:
             - name: master
               image: "docker-registry.default.svc:5000/richardmproject/is-bigdatastack-spark:latest"
               ports: 
                - name: "masterport"
                  containerPort: 7077
                  protocol: "TCP"
                - name: "masterui"
                  containerPort: 8080
                  protocol: "TCP"
               env:
                - name: "owner"
                  value: "$owner$"
                - name: "namespace"
                  value: "$namespace$"
                - name: "appID"
                  value: "$appID$"
                - name: "objectID"
                  value: "$objectID$"
                - name: "instance"
                  value: "$instance$"
                - name: "SPARK_MODE"
                  value: "master"
                - name: "LXDB_HOST"
                  value: "service-lxs-store-eroski.lxs-store.svc.cluster.local"
                - name: "LXDB_PORT"
                  value: "1529"
                - name: "LXDB_DBNAME"
                  value: "BigDataStackDB"
                - name: "LXDB_USERNAME"
                  value: "EROSKI"
                - name: "KAFKA_TOPIC"
                  value: "test"
                - name: "KAFKA_HOST"
                  value: "kafka-server1"
                - name: "KAFKA_HOST"
                  value: "9092"
                - name: "KAFKA_GROUPID"
                  value: "my-group"
               resources: 
                 limits:
                   cpu: "1000m"
                   memory: "2048Mi"
                 requests:
                   cpu: "1000m"
                   memory: "2048Mi"
               securityContext: {}
               serviceAccount: containerroot
               imagePullPolicy: "Always"
            restartPolicy: "Always"
  
  # Deployment Config: spark-worker
  - objectID: "spark-worker"
    yamlSource:
      apiVersion: apps.openshift.io/v1
      kind: DeploymentConfig
      spec:
        replicas: 1
        strategy:
          resources: {}
        template:
          metadata:
            labels:
              jobconfig: $appID$-$objectID$-$instance$
          spec:
            containers:
             - name: master
               image: "docker-registry.default.svc:5000/richardmproject/is-bigdatastack-spark:latest"
               ports: 
                - name: "workerport"
                  containerPort: 7077
                  protocol: "TCP"
               env:
                - name: "owner"
                  value: "$owner$"
                - name: "namespace"
                  value: "$namespace$"
                - name: "appID"
                  value: "$appID$"
                - name: "objectID"
                  value: "$objectID$"
                - name: "instance"
                  value: "$instance$"
                - name: "SPARK_MODE"
                  value: "worker"
                - name: "SPARK_MASTER_URL"
                  value: "$sparkmasterservice$:7077"
                - name: "LXDB_HOST"
                  value: "service-lxs-store-eroski.lxs-store.svc.cluster.local"
                - name: "LXDB_PORT"
                  value: "1529"
                - name: "LXDB_DBNAME"
                  value: "BigDataStackDB"
                - name: "LXDB_USERNAME"
                  value: "EROSKI"
                - name: "KAFKA_TOPIC"
                  value: "test"
                - name: "KAFKA_HOST"
                  value: "kafka-server1"
                - name: "KAFKA_HOST"
                  value: "9092"
                - name: "KAFKA_GROUPID"
                  value: "my-group"
               resources: 
                 limits:
                   cpu: "1000m"
                   memory: "2048Mi"
                 requests:
                   cpu: "1000m"
                   memory: "2048Mi"
               securityContext: {}
               serviceAccount: containerroot
               imagePullPolicy: "Always"
            restartPolicy: "Always"
  
  # Service: srv-recommendation-ui
  - objectID: "srv-spark-master"
    yamlSource:
      apiVersion: v1
      kind: Service
      spec:
        selector:
          sparkmaster: $appID$-spark-master
        ports:
          - name: "master"
            protocol: "TCP"
            port: 7077
            targetPort: 7077
          - name: "ui"
            protocol: "TCP"
            port: 8080
            targetPort: 8080
  
  # Route: route-spark
  - objectID: "sparkui"
    yamlSource:
      kind: Route
      apiVersion: route.openshift.io/v1
      spec:
        host: sparkui-$namespace$.$hostExtension$
        to:
          kind: Service
          name: $serviceLookup$
          weight: 100
        port:
          targetPort: ui
        wildcardPolicy: None

sequences:
  - sequenceID: "master"
    name: "Start Spark Master"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Deploys the spark master container on the cluster along with its network service and route so it can be accessed"
    parameters: {}
    operations:
      # Steps for creating the deployment config
      - className: Instantiate # Spawn a new copy from the template
        objectID: "spark-master"
        defineInstanceRef: "master"
      - className: SetSequenceParameters # Fill in any missing placeholders
        instanceRef: "master"
      - className: Apply # Create deployment config on the cluster
        instanceRef: "master"
      - className: WaitFor # Wait until the deployment config is reporting available
        instanceRef: "master"
        waitForStatus: "Available"
      # Now create the service
      - className: Instantiate # Spawn a new copy from the template
        objectID: "srv-spark-master"
        defineInstanceRef: "newService"
      - className: Apply # Create the service on the cluster
        instanceRef: "newService"
      # Now create the route
      - className: ParameterFromObjectLookup # Generates a parameter value by querying the cluster state
        parameter: "serviceLookup"
        criteria: "$namespace$:service:$appID$-srv-spark-master-.*"
        multipleMatches: "SelectFirst"
      - className: Instantiate # Spawn a new copy from the template
        objectID: "sparkui"
        defineInstanceRef: "newRoute"
      - className: SetSequenceParameters # Fill in any missing placeholders (most notably 'serviceLookup' found above)
        instanceRef: "newRoute"
      - className: Apply # Create the route on the cluster
        instanceRef: "newRoute"
    mode: Continue
  - sequenceID: "worker"
    name: "Start Spark Worker"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Deploys the spark worker container on the cluster"
    parameters: {}
    operations:
      # Steps for creating the deployment config
      - className: Instantiate # Spawn a new copy from the template
        objectID: "spark-worker"
        defineInstanceRef: "worker"
      - className: ParameterFromObjectLookup # lookup the name of the master's service
        parameter: "sparkmasterservice"
        criteria: "$namespace$:service:$appID$-srv-spark-master-.*"
        multipleMatches: "SelectFirst"
      - className: SetSequenceParameters # Fill in any missing placeholders
        instanceRef: "worker"
      - className: Apply # Create deployment config on the cluster
        instanceRef: "worker"
      - className: WaitFor # Wait until the deployment config is reporting available
        instanceRef: "worker"
        waitForStatus: "Available"
    mode: Continue
  - sequenceID: "deployjar"
    name: "Deploy Job"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Deploys a job onto the Spark instance"
    parameters: {}
    operations:
     - className: "ExecuteCMD"
       objectID: "spark-master"
       instancelookupCriteria: "first"
       commands:
        - - "wget"
          - "http://nfswebhost-richardmproject.ida.dcs.gla.ac.uk/bigdatastack/ATOSWL/als-spark-streaming-assembly-0.1.jar"
          - "-O"
          - "/tmp/als-spark-streaming-assembly-0.1.jar"
     - className: "ExecuteCMD"
       objectID: "spark-worker"
       instancelookupCriteria: "all"
       commands:
        - - "wget"
          - "http://nfswebhost-richardmproject.ida.dcs.gla.ac.uk/bigdatastack/ATOSWL/als-spark-streaming-assembly-0.1.jar"
          - "-O"
          - "/tmp/als-spark-streaming-assembly-0.1.jar"
     - className: "ExecuteCMD"
       objectID: "spark-master"
       instancelookupCriteria: "first"
       commands:
        - - "bin/spark-submit"
          - "--class"
          - "Main"
          - "--master"
          - "spark://0.0.0.0:7077"
          - "--deploy-mode"
          - "cluster"
          - "/tmp/als-spark-streaming-assembly-0.1.jar"
    mode: Continue
  - sequenceID: "scaleworker"
    name: "Scale Up Worker"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Increases the replication factor for a worker"
    parameters: {}
    operations:
     - className: "ScaleUp"
       objectID: "spark-worker"
       instance: 1
       increaseBy: 1
    mode: Continue
  - sequenceID: "deleteworker"
    name: "Delete Worker"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Deletes a worker"
    parameters: {}
    operations:
     - className: "InstanceRefFromObjectLookup"
       defineInstanceRef: "workerInstance"
       criteria: "$namespace$:deploymentconfig:$appID$-spark-worker-.*"
       multipleMatches: "SelectFirst"
     - className: "Delete"
       instanceRef: "workerInstance"
    mode: Continue
  - sequenceID: "feedbackcollector"
    name: "Deploy Feedback Collector"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Deploys the feedback collector service, along with the associated service and external end-point so the UI can be accessed"
    parameters: {}
    operations:
      # Steps for creating the deployment config
      - className: Instantiate # Spawn a new copy from the template
        objectID: "feedbackcollector"
        defineInstanceRef: "feedbackcollectorInstance"
      - className: SetSequenceParameters # Fill in any missing placeholders
        instanceRef: "feedbackcollectorInstance"
      - className: Apply # Create deployment config on the cluster
        instanceRef: "feedbackcollectorInstance"
      - className: WaitFor # Wait until the deployment config is reporting available
        instanceRef: "feedbackcollectorInstance"
        waitForStatus: "Available"
      # Now create the service
      - className: Instantiate # Spawn a new copy from the template
        objectID: "srv-feedbackcollector"
        defineInstanceRef: "newServiceFC"
      - className: Apply # Create the service on the cluster
        instanceRef: "newServiceFC"
      # Now create the route
      - className: ParameterFromObjectLookup # Generates a parameter value by querying the cluster state
        parameter: "serviceFeedbackCollectorLookup"
        criteria: "$namespace$:service:$appID$-srv-feedbackcollector-.*"
        multipleMatches: "SelectFirst"
      - className: Instantiate # Spawn a new copy from the template
        objectID: "route-feedbackcollector"
        defineInstanceRef: "newRouteFC"
      - className: SetSequenceParameters # Fill in any missing placeholders (most notably 'serviceLookup' found above)
        instanceRef: "newRouteFC"
      - className: Apply # Create the route on the cluster
        instanceRef: "newRouteFC"
    mode: Continue
  - sequenceID: "kafka"
    name: "Deploy Apache Kafka Server"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Deploys the Kafka server that is used to tranfer data between the feedback collector and the Spark recommender. This also sets up a Zookeeper instance used by Kafka, along with the associated services."
    parameters: {}
    operations:
      # Steps for creating the deployment config
      - className: Instantiate # Spawn a new copy from the template
        objectID: "zookeeper-server"
        defineInstanceRef: "zookeeperInstance"
      - className: SetSequenceParameters # Fill in any missing placeholders
        instanceRef: "zookeeperInstance"
      - className: Apply # Create deployment config on the cluster
        instanceRef: "zookeeperInstance"
      - className: WaitFor # Wait until the deployment config is reporting available
        instanceRef: "zookeeperInstance"
        waitForStatus: "Available"
      # Now create the service
      - className: Instantiate # Spawn a new copy from the template
        objectID: "srv-zookeeper"
        defineInstanceRef: "newServiceZK"
      - className: Apply # Create the service on the cluster
        instanceRef: "newServiceZK"
      # Now create the service
      - className: Instantiate # Spawn a new copy from the template
        objectID: "srv-kafka"
        defineInstanceRef: "newServiceKafka"
      - className: Apply # Create the service on the cluster
        instanceRef: "newServiceKafka"
      - className: ParameterFromObjectLookup # Generates a parameter value by querying the cluster state
        parameter: "kafkaLookup"
        criteria: "$namespace$:service:$appID$-srv-kafka-.*"
        multipleMatches: "SelectFirst"
      - className: ParameterFromObjectLookup # Generates a parameter value by querying the cluster state
        parameter: "zookeeperLookup"
        criteria: "$namespace$:service:$appID$-srv-zookeeper-.*"
        multipleMatches: "SelectFirst"
      # Steps for creating the deployment config
      - className: Instantiate # Spawn a new copy from the template
        objectID: "kafka-server"
        defineInstanceRef: "kafkaInstance"
      - className: SetSequenceParameters # Fill in any missing placeholders
        instanceRef: "kafkaInstance"
      - className: Apply # Create deployment config on the cluster
        instanceRef: "kafkaInstance"
      - className: WaitFor # Wait until the deployment config is reporting available
        instanceRef: "kafkaInstance"
        waitForStatus: "Available"
    mode: Continue  