appID: "spark"
name: "Apache Spark"
description: "Apache Spark is an open-source distributed general-purpose cluster-computing framework. Spark provides an interface for programming entire clusters with implicit data parallelism and fault tolerance."
owner: "$owner$"
namespace: "$namespace$"
types:
 - playbook
 - inferMissingValues
 - overrideValues
 - setObjectMetadata


objects:
  # Deployment Config: spark-master
  - objectID: "spark-master"
    yamlSource:
      apiVersion: apps.openshift.io/v1
      kind: DeploymentConfig
      spec:
        replicas: 1
        strategy:
          resources: {}
        template:
          metadata:
            labels:
              jobconfig: $appID$-$objectID$-$instance$
              sparkmaster: $appID$-$objectID$
          spec:
            containers:
             - name: master
               image: "docker-registry.default.svc:5000/richardmproject/is-bigdatastack-spark:latest"
               ports: 
                - name: "masterport"
                  containerPort: 7077
                  protocol: "TCP"
                - name: "masterui"
                  containerPort: 8080
                  protocol: "TCP"
               env:
                - name: "owner"
                  value: "$owner$"
                - name: "namespace"
                  value: "$namespace$"
                - name: "appID"
                  value: "$appID$"
                - name: "objectID"
                  value: "$objectID$"
                - name: "instance"
                  value: "$instance$"
                - name: "SPARK_MODE"
                  value: "master"
               resources: 
                 limits:
                   cpu: "1000m"
                   memory: "2048Mi"
                 requests:
                   cpu: "1000m"
                   memory: "2048Mi"
               securityContext: {}
               serviceAccount: containerroot
               imagePullPolicy: "Always"
            restartPolicy: "Always"
  
  # Deployment Config: spark-worker
  - objectID: "spark-worker"
    yamlSource:
      apiVersion: apps.openshift.io/v1
      kind: DeploymentConfig
      spec:
        replicas: 1
        strategy:
          resources: {}
        template:
          metadata:
            labels:
              jobconfig: $appID$-$objectID$-$instance$
          spec:
            containers:
             - name: master
               image: "docker-registry.default.svc:5000/richardmproject/is-bigdatastack-spark:latest"
               ports: 
                - name: "workerport"
                  containerPort: 7077
                  protocol: "TCP"
               env:
                - name: "owner"
                  value: "$owner$"
                - name: "namespace"
                  value: "$namespace$"
                - name: "appID"
                  value: "$appID$"
                - name: "objectID"
                  value: "$objectID$"
                - name: "instance"
                  value: "$instance$"
                - name: "SPARK_MODE"
                  value: "worker"
                - name: "SPARK_MASTER_URL"
                  value: "$sparkmasterservice$:7077"
               resources: 
                 limits:
                   cpu: "1000m"
                   memory: "2048Mi"
                 requests:
                   cpu: "1000m"
                   memory: "2048Mi"
               securityContext: {}
               serviceAccount: containerroot
               imagePullPolicy: "Always"
            restartPolicy: "Always"
  
  # Service: srv-recommendation-ui
  - objectID: "srv-spark-master"
    yamlSource:
      apiVersion: v1
      kind: Service
      spec:
        selector:
          sparkmaster: $appID$-spark-master
        ports:
          - name: "master"
            protocol: "TCP"
            port: 7077
            targetPort: 7077
          - name: "ui"
            protocol: "TCP"
            port: 8080
            targetPort: 8080
  
  # Route: route-spark
  - objectID: "sparkui"
    yamlSource:
      kind: Route
      apiVersion: route.openshift.io/v1
      spec:
        host: sparkui-$namespace$.$hostExtension$
        to:
          kind: Service
          name: $serviceLookup$
          weight: 100
        port:
          targetPort: ui
        wildcardPolicy: None

sequences:
  - sequenceID: "master"
    name: "Start Spark Master"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Deploys the spark master container on the cluster along with its network service and route so it can be accessed"
    parameters: {}
    operations:
      # Steps for creating the deployment config
      - className: Instantiate # Spawn a new copy from the template
        objectID: "spark-master"
        defineInstanceRef: "master"
      - className: SetSequenceParameters # Fill in any missing placeholders
        instanceRef: "master"
      - className: Apply # Create deployment config on the cluster
        instanceRef: "master"
      - className: WaitFor # Wait until the deployment config is reporting available
        instanceRef: "master"
        waitForStatus: "Available"
      # Now create the service
      - className: Instantiate # Spawn a new copy from the template
        objectID: "srv-spark-master"
        defineInstanceRef: "newService"
      - className: Apply # Create the service on the cluster
        instanceRef: "newService"
      # Now create the route
      - className: ParameterFromObjectLookup # Generates a parameter value by querying the cluster state
        parameter: "serviceLookup"
        criteria: "$namespace$:service:$appID$-srv-spark-master-.*"
        multipleMatches: "SelectFirst"
      - className: Instantiate # Spawn a new copy from the template
        objectID: "sparkui"
        defineInstanceRef: "newRoute"
      - className: SetSequenceParameters # Fill in any missing placeholders (most notably 'serviceLookup' found above)
        instanceRef: "newRoute"
      - className: Apply # Create the route on the cluster
        instanceRef: "newRoute"
    mode: Continue
  - sequenceID: "worker"
    name: "Start Spark Worker"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Deploys the spark worker container on the cluster"
    parameters: {}
    operations:
      # Steps for creating the deployment config
      - className: Instantiate # Spawn a new copy from the template
        objectID: "spark-worker"
        defineInstanceRef: "worker"
      - className: ParameterFromObjectLookup # lookup the name of the master's service
        parameter: "sparkmasterservice"
        criteria: "$namespace$:service:$appID$-srv-spark-master-.*"
        multipleMatches: "SelectFirst"
      - className: SetSequenceParameters # Fill in any missing placeholders
        instanceRef: "worker"
      - className: Apply # Create deployment config on the cluster
        instanceRef: "worker"
      - className: WaitFor # Wait until the deployment config is reporting available
        instanceRef: "worker"
        waitForStatus: "Available"
    mode: Continue
  - sequenceID: "deployjar"
    name: "Deploy Job"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Deploys a job onto the Spark instance"
    parameters: {}
    operations:
     - className: "ExecuteCMD"
       objectID: "spark-master"
       instancelookupCriteria: "first"
       commands:
        - - "wget"
          - "http://www.dcs.gla.ac.uk/~richardm/Temp/BigDataStack-Spark-Example-1.0.jar"
          - "-O"
          - "/tmp/BigDataStack-Spark-Example-1.0.jar"
     - className: "ExecuteCMD"
       objectID: "spark-worker"
       instancelookupCriteria: "all"
       commands:
        - - "wget"
          - "http://www.dcs.gla.ac.uk/~richardm/Temp/BigDataStack-Spark-Example-1.0.jar"
          - "-O"
          - "/tmp/BigDataStack-Spark-Example-1.0.jar"
     - className: "ExecuteCMD"
       objectID: "spark-master"
       instancelookupCriteria: "first"
       commands:
        - - "bin/spark-submit"
          - "--class"
          - "Main"
          - "--master"
          - "spark://localhost:7077"
          - "--deploy-mode"
          - "client"
          - "/tmp/BigDataStack-Spark-Example-1.0.jar"
    mode: Continue
  - sequenceID: "scaleworker"
    name: "Scale Up Worker"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Increases the replication factor for a worker"
    parameters: {}
    operations:
     - className: "ScaleUp"
       objectID: "spark-worker"
       instance: 1
       increaseBy: 1
    mode: Continue
  - sequenceID: "deleteworker"
    name: "Delete Worker"
    appID: "$appID$"
    owner: "$owner$"
    namespace: "$namespace$"
    description: "Deletes a worker"
    parameters: {}
    operations:
     - className: "InstanceRefFromObjectLookup"
       defineInstanceRef: "workerInstance"
       criteria: "$namespace$:deploymentconfig:$appID$-spark-worker-.*"
       multipleMatches: "SelectFirst"
     - className: "Delete"
       instanceRef: "workerInstance"
    mode: Continue