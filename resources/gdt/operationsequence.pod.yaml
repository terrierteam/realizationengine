owner: richardm
objectID: "operationsequence"
type: Pod

yamlSource:
  apiVersion: v1
  kind: Pod
  metadata:
    name: $appID$-$sequenceID$-$sequenceInstance$
    namespace: $namespace$
    labels:
      operationsequence: "True"
  spec:
    containers:
    - name: gdtmain
      image: "docker-registry.default.svc:5000/richardmproject/is-bigdatastack-gdt:latest"
      imagePullPolicy: Always
      command:
       - 'java'
      args:
       - '-jar'
       - './target/BigDataStack-GDT-Data-0.0.1-SNAPSHOT.jar'
       - 'operationSequence'
      env:
       - name: "owner"
         value: "$owner$"
       - name: "namespace"
         value: "$namespace$"
       - name: "dbhost"
         value: "$dbhost$"
       - name: "dbport"
         value: "$dbport$"
       - name: "dbname"
         value: "$dbname$"
       - name: "dbusername"
         value: "$dbusername$"
       - name: "dbpassword"
         value: "$dbpassword$"
       - name: "ochost"
         value: "$ochost$"
       - name: "ocport"
         value: "$ocport$"
       - name: "ocusername"
         value: "$ocusername$"
       - name: "ocpassword"
         value: "$ocpassword$"
       - name: "rmqhost"
         value: "$rmqhost$"
       - name: "rmqport"
         value: "$rmqport$"
       - name: "rmqusername"
         value: "$rmqusername$"
       - name: "rmqpassword"
         value: "$rmqpassword$"
       - name: "appID"
         value: "$appID$"
       - name: "sequenceID"
         value: "$sequenceID$" 
       - name: "sequenceInstance"
         value: "$sequenceInstance$" 
      resources: {}
    dnsPolicy: ClusterFirst
    restartPolicy: Never