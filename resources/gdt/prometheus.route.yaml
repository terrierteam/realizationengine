appID: "gdtdefaultapp"
owner: "richardm"

objectID: "prometheusroute"
type: Service

yamlSource:
  kind: Route
  apiVersion: route.openshift.io/v1
  metadata:
    name: $objectID$
    namespace: $namespace$
  spec:
    host: prometheus-gdt-$namespace$.ida.dcs.gla.ac.uk
    to:
      kind: Service
      name: $service$
      weight: 100
    port:
      targetPort: web
    wildcardPolicy: None