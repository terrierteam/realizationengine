appID: "gdtdefaultapp"
owner: "gdt"

objectID: "prometheusrb"
type: RoleBinding

yamlSource:
  kind: RoleBinding
  apiVersion: rbac.authorization.k8s.io/v1
  metadata:
    name: $namespace$-$appID$-$objectID$-$instance$
    namespace: $namespace$
  subjects:
    - kind: ServiceAccount
      name: $serviceaccount$
      namespace: $namespace$
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: $role$